name: Python Automation CI

# 1. The Trigger: When should this run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. The Job: What server are we using?
jobs:
  test-run:
    runs-on: ubuntu-latest

    # 3. The Steps: What exactly are we doing?
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip' # Speeds up future runs by caching dependencies

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install

    - name: Execute Pytest Suite
      run: pytest --html=report.html # Generates the HTML report
      
    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always() # This forces the upload even if the tests fail!
      with:
        name: pytest-automation-report
        path: report.html